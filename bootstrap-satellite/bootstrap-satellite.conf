# Path to the set-hostname RPM on the VM
SET_HOSTNAME_RPM="/root/set-hostname-1.0-1.el9.noarch.rpm"

# Satellite version (interpolated into repo names)
SATELLITE_VERSION="6.19"

# Repositories to enable (all others are disabled first)
SATELLITE_REPOS=(
    "rhel-9-for-x86_64-baseos-rpms"
    "rhel-9-for-x86_64-appstream-rpms"
    "satellite-${SATELLITE_VERSION}-for-rhel-9-x86_64-rpms"
    "satellite-maintenance-${SATELLITE_VERSION}-for-rhel-9-x86_64-rpms"
)

# Firewall TCP ports to open
FIREWALL_PORTS=(
    "8000/tcp"
    "9090/tcp"
)

# Firewall services to open
FIREWALL_SERVICES=(
    "dns"
    "dhcp"
    "tftp"
    "http"
    "https"
    "puppetmaster"
)
